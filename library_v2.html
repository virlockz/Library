<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Library</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root{
  --parch-bg:#F5F0E8;--parch-page:#FBF7EF;--parch-text:#2C2416;--parch-text2:#5C4A2A;
  --parch-accent:#8B4513;--parch-border:#C8A96E;--parch-tab:#E8DFC8;
  --mod-bg:#1C1B19;--mod-page:#242320;--mod-text:#F0EDE6;--mod-text2:#7A7870;
  --mod-accent:#C96442;--mod-accent-dim:rgba(201,100,66,0.15);
  --mod-border:rgba(255,255,255,0.08);--mod-border-mid:rgba(255,255,255,0.13);--mod-tab:#1C1B19;
  --flow-bg:#0D1F2D;--flow-page:#112233;--flow-text:#E8F4F8;--flow-text2:#5B8FA8;
  --flow-accent:#00C2CC;--flow-accent-dim:rgba(0,194,204,0.12);
  --flow-border:rgba(0,194,204,0.15);--flow-border-mid:rgba(0,194,204,0.25);--flow-tab:#0A1A26;
  --veil-bg:#0D0B14;--veil-page:#14111E;--veil-text:#D8D4E8;--veil-text2:#6E6880;
  --veil-accent:#B8962E;--veil-accent-dim:rgba(184,150,46,0.14);
  --veil-border:rgba(255,255,255,0.07);--veil-border-mid:rgba(255,255,255,0.12);--veil-tab:#100E18;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;}

/* ── APP SHELL ── */
#app{font-family:'Lato',sans-serif;min-height:100vh;transition:background 0.4s;}
#app.parchment{background:var(--parch-bg);color:var(--parch-text);}
#app.modern{background:var(--mod-bg);color:var(--mod-text);}
#app.current{background:var(--flow-bg);color:var(--flow-text);}
#app.veil{background:var(--veil-bg);color:var(--veil-text);}
.veil .lib-topbar{background:var(--veil-tab);border-bottom:0.5px solid var(--veil-border);}
.veil .lib-wordmark{color:var(--veil-accent);}
.veil .lib-heading{color:var(--veil-accent);}
.veil .book-card{background:var(--veil-page);border:0.5px solid var(--veil-border);}
.veil .book-card:hover{background:#1A1626;transform:translateY(-3px);border-color:rgba(184,150,46,0.35);}
.veil .book-card-domain{color:var(--veil-accent);}
.veil .book-card-title{color:var(--veil-text);}
.veil .book-card-meta{color:var(--veil-text2);}
.veil .book-card-open{color:var(--veil-accent);}
.veil .top-bar{background:var(--veil-tab);border-bottom:0.5px solid var(--veil-border);}
.veil .back-btn{border-color:var(--veil-border-mid);color:var(--veil-text2);background:rgba(184,150,46,0.05);}
.veil .back-btn:hover{background:var(--veil-accent-dim);color:var(--veil-accent);border-color:rgba(184,150,46,0.4);}
.veil .book-title-bar{color:var(--veil-accent);}
.veil .icon-btn{border-color:var(--veil-border-mid);color:var(--veil-accent);background:var(--veil-accent-dim);}
.veil .icon-btn:hover{background:rgba(184,150,46,0.22);border-color:rgba(184,150,46,0.5);}
.veil .tab-bar{border-bottom:0.5px solid var(--veil-border);}
.veil .tab{color:var(--veil-text2);}
.veil .tab:hover{color:var(--veil-text);}
.veil .tab.active{color:var(--veil-accent);border-bottom-color:var(--veil-accent);}
.veil .chapter-nav{background:var(--veil-bg);border-bottom:0.5px solid var(--veil-border);}
.veil .ch-btn{background:var(--veil-accent-dim);border:0.5px solid var(--veil-border);color:var(--veil-text2);}
.veil .ch-btn:hover,.veil .ch-btn.active{background:rgba(184,150,46,0.22);color:var(--veil-accent);border-color:rgba(184,150,46,0.4);}
.veil .page-spread{background:var(--veil-page);border:0.5px solid var(--veil-border);}
.veil .page-spread::before{background:var(--veil-accent);}
.veil .chapter-label{color:var(--veil-accent);}
.veil .page-heading{color:var(--veil-accent);border-bottom:0.5px solid var(--veil-border);}
.veil .sub-heading{color:var(--veil-accent);}
.veil .page-body{color:var(--veil-text);}
.veil .page-footer{border-top:0.5px solid var(--veil-border);color:var(--veil-text2);}
.veil .flip-indicator{background:rgba(184,150,46,0.12);color:var(--veil-accent);}
.veil .pnav-btn{border:0.5px solid var(--veil-border);color:var(--veil-text2);background:rgba(255,255,255,0.03);}
.veil .pnav-btn:hover:not(:disabled){background:var(--veil-accent-dim);color:var(--veil-accent);border-color:rgba(184,150,46,0.35);}
.veil .page-indicator{color:var(--veil-text2);}
.veil .notes-heading{color:var(--veil-accent);border-bottom:0.5px solid var(--veil-border);}
.veil .notes-chapter-title{color:var(--veil-accent);border-bottom:0.5px solid var(--veil-border);}
.veil .note-card{background:var(--veil-page);border:0.5px solid var(--veil-border);}
.veil .badge-page{background:rgba(184,150,46,0.18);color:#C8A83E;}
.veil .badge-chapter{background:rgba(80,200,100,0.14);color:#5DCAA5;}
.veil .badge-book{background:rgba(130,100,220,0.18);color:#A090D8;}
.veil .note-text{color:var(--veil-text);}
.veil .note-meta{color:var(--veil-text2);}
.veil .floating-note-btn{background:var(--veil-accent);color:#0D0B14;}
.veil .modal-box{background:var(--veil-page);border:0.5px solid var(--veil-border-mid);}
.veil .modal-title{color:var(--veil-accent);}
.veil .note-type-btn{border:0.5px solid var(--veil-border);color:var(--veil-text2);}
.veil .note-type-btn.selected{background:var(--veil-accent-dim);color:var(--veil-accent);border-color:rgba(184,150,46,0.4);}
.veil .modal-desc{color:var(--veil-text2);}
.veil .note-textarea{background:var(--veil-bg);color:var(--veil-text);border:0.5px solid var(--veil-border);}
.veil .note-textarea:focus{border-color:rgba(184,150,46,0.5);}
.veil .btn-save{background:var(--veil-accent);color:#0D0B14;}
.veil .btn-cancel{border:0.5px solid var(--veil-border);color:var(--veil-text2);}
.veil .view-notes-inline-btn{border:0.5px solid var(--veil-border);color:var(--veil-accent);}
.veil .view-notes-inline-btn:hover{background:var(--veil-accent-dim);border-color:rgba(184,150,46,0.4);}
.veil .lib-tab-bar{background:var(--veil-tab);border-bottom:0.5px solid var(--veil-border);}
.veil .lib-tab{color:var(--veil-text2);}
.veil .lib-tab:hover{color:var(--veil-text);}
.veil .lib-tab.active{color:var(--veil-accent);border-bottom-color:var(--veil-accent);}
.veil .all-notes-heading{color:var(--veil-accent);}
.veil .book-notes-row{background:var(--veil-page);border:0.5px solid var(--veil-border);}
.veil .book-notes-row:hover{background:#1A1626;transform:translateY(-2px);border-color:rgba(184,150,46,0.35);}
.veil .bnr-domain{color:var(--veil-accent);}
.veil .bnr-title{color:var(--veil-text);}
.veil .bnr-counts{color:var(--veil-text2);}
.veil .bnr-open{color:var(--veil-accent);}
.veil .book-notes-detail-topbar{background:var(--veil-tab);border-bottom:0.5px solid var(--veil-border);}
.veil .book-notes-toggle-bar{background:var(--veil-bg);border-bottom:0.5px solid var(--veil-border);}
.veil .bntog{border:0.5px solid var(--veil-border);color:var(--veil-text2);}
.veil .bntog.active{background:var(--veil-accent-dim);color:var(--veil-accent);border-color:rgba(184,150,46,0.4);}
.veil .open-in-book-btn{border:0.5px solid var(--veil-border);color:var(--veil-accent);}
.veil .open-in-book-btn:hover{background:var(--veil-accent-dim);border-color:rgba(184,150,46,0.4);}

/* ── SCREENS ── */
.screen{display:none;}
.screen.active{display:block;}

/* ══════════════════════════════
   LIBRARY SCREEN
══════════════════════════════ */
.lib-container{max-width:860px;margin:0 auto;padding:0 16px 60px;}

.lib-topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 16px;border-bottom:1px solid;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px;}
.parchment .lib-topbar{background:var(--parch-tab);border-color:var(--parch-border);}
.modern .lib-topbar{background:var(--mod-tab);border-bottom:0.5px solid var(--mod-border);}
.current .lib-topbar{background:var(--flow-tab);border-bottom:0.5px solid var(--flow-border);}

.lib-wordmark{font-family:'EB Garamond',serif;font-size:22px;font-weight:600;letter-spacing:0.5px;}
.parchment .lib-wordmark{color:var(--parch-accent);}
.modern .lib-wordmark{color:var(--mod-accent);}
.current .lib-wordmark{color:var(--flow-accent);}

.lib-topbar-controls{display:flex;gap:8px;}

.lib-heading{font-family:'EB Garamond',serif;font-size:32px;font-weight:600;margin:36px 0 6px;}
.parchment .lib-heading{color:var(--parch-accent);}
.modern .lib-heading{color:var(--mod-accent);}
.current .lib-heading{color:var(--flow-accent);}

.lib-sub{font-size:14px;margin-bottom:28px;opacity:0.6;}

.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;}

.book-card{border-radius:12px;padding:22px 20px;cursor:pointer;transition:all 0.22s;border:1px solid;position:relative;overflow:hidden;}
.parchment .book-card{background:var(--parch-page);border-color:var(--parch-border);}
.parchment .book-card:hover{box-shadow:0 6px 24px rgba(139,69,19,0.18);transform:translateY(-3px);border-color:var(--parch-accent);}
.modern .book-card{background:var(--mod-page);border:0.5px solid var(--mod-border);}
.modern .book-card:hover{background:#2E2D2A;transform:translateY(-3px);border-color:var(--mod-border-mid);}
.current .book-card{background:var(--flow-page);border:0.5px solid var(--flow-border);}
.current .book-card:hover{background:#163348;transform:translateY(-3px);border-color:var(--flow-accent);}

.book-card-spine{width:4px;height:100%;position:absolute;left:0;top:0;border-radius:12px 0 0 12px;}
.parchment .book-card-spine{background:var(--parch-accent);}
.modern .book-card-spine{background:var(--mod-accent);}

.book-card[data-theme="current"] .book-card-spine{background:var(--flow-accent);}
.book-card[data-theme="parchment"] .book-card-spine{background:var(--parch-accent);}
.book-card[data-theme="modern"] .book-card-spine{background:var(--mod-accent);}

.book-card-domain{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;padding-left:4px;}
.parchment .book-card-domain{color:var(--parch-accent);}
.modern .book-card-domain{color:var(--mod-accent);}
.current .book-card-domain{color:var(--flow-accent);}

.book-card-title{font-family:'EB Garamond',serif;font-size:20px;font-weight:600;line-height:1.25;margin-bottom:8px;padding-left:4px;}
.parchment .book-card-title{color:var(--parch-text);}
.modern .book-card-title{color:var(--mod-text);}
.current .book-card-title{color:var(--flow-text);}

.book-card-meta{font-size:12px;padding-left:4px;display:flex;gap:12px;flex-wrap:wrap;}
.parchment .book-card-meta{color:var(--parch-text2);}
.modern .book-card-meta{color:var(--mod-text2);}
.current .book-card-meta{color:var(--flow-text2);}

.book-card-meta span{display:flex;align-items:center;gap:4px;}

.book-card-open{margin-top:16px;padding-left:4px;font-size:12px;font-weight:700;letter-spacing:0.5px;display:flex;align-items:center;gap:4px;transition:gap 0.2s;}
.parchment .book-card-open{color:var(--parch-accent);}
.modern .book-card-open{color:var(--mod-accent);}
.current .book-card-open{color:var(--flow-accent);}
.book-card:hover .book-card-open{gap:8px;}

/* theme badge */
.theme-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:12px;margin-left:4px;}
.theme-badge-dot{width:7px;height:7px;border-radius:50%;}

/* ══════════════════════════════
   SHARED BOOK READER
══════════════════════════════ */
.book-container{max-width:780px;margin:0 auto;padding:0 0 80px;position:relative;}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px;}
.parchment .top-bar{background:var(--parch-tab);border-color:var(--parch-border);}
.modern .top-bar{background:var(--mod-tab);border-bottom:0.5px solid var(--mod-border);}
.current .top-bar{background:var(--flow-tab);border-bottom:0.5px solid var(--flow-border);}

.back-btn{font-family:'Lato',sans-serif;font-size:13px;font-weight:700;border:1.5px solid;border-radius:8px;padding:6px 12px;cursor:pointer;background:none;transition:all 0.2s;display:flex;align-items:center;gap:5px;}
.parchment .back-btn{border-color:var(--parch-accent);color:var(--parch-accent);}
.parchment .back-btn:hover{background:var(--parch-accent);color:#fff;}
.modern .back-btn{border-color:var(--mod-border-mid);color:var(--mod-text2);background:rgba(255,255,255,0.04);}
.modern .back-btn:hover{background:var(--mod-accent-dim);color:var(--mod-accent);border-color:rgba(201,100,66,0.35);}
.current .back-btn{border-color:var(--flow-border-mid);color:var(--flow-text2);background:rgba(0,194,204,0.05);}
.current .back-btn:hover{background:var(--flow-accent-dim);color:var(--flow-accent);border-color:var(--flow-accent);}

.book-title-bar{font-family:'EB Garamond',serif;font-size:17px;font-weight:600;letter-spacing:0.3px;flex:1;text-align:center;padding:0 8px;}
.parchment .book-title-bar{color:var(--parch-accent);}
.modern .book-title-bar{color:var(--mod-accent);}
.current .book-title-bar{color:var(--flow-accent);}

.top-controls{display:flex;gap:8px;align-items:center;}
.icon-btn{background:none;border:1.5px solid;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:13px;font-family:'Lato',sans-serif;transition:all 0.2s;display:flex;align-items:center;gap:5px;font-weight:700;}
.parchment .icon-btn{border-color:var(--parch-accent);color:var(--parch-accent);background:rgba(139,69,19,0.08);}
.parchment .icon-btn:hover{background:var(--parch-accent);color:#fff;}
.modern .icon-btn{border-color:var(--mod-border-mid);color:var(--mod-text2);background:rgba(255,255,255,0.04);}
.modern .icon-btn:hover{background:var(--mod-accent-dim);color:var(--mod-accent);border-color:rgba(201,100,66,0.35);}
.current .icon-btn{border-color:var(--flow-border-mid);color:var(--flow-text2);background:rgba(0,194,204,0.05);}
.current .icon-btn:hover{background:var(--flow-accent-dim);color:var(--flow-accent);border-color:var(--flow-accent);}

.tab-bar{display:flex;gap:2px;padding:0 16px;border-bottom:2px solid;margin-top:4px;}
.parchment .tab-bar{border-color:var(--parch-border);}
.modern .tab-bar{border-bottom:0.5px solid var(--mod-border);}
.current .tab-bar{border-bottom:0.5px solid var(--flow-border);}

.tab{padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:none;font-family:'Lato',sans-serif;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.2s;letter-spacing:0.3px;}
.parchment .tab{color:#3A2008;}
.parchment .tab:hover{color:var(--parch-accent);}
.parchment .tab.active{color:var(--parch-accent);border-bottom-color:var(--parch-accent);}
.modern .tab{color:var(--mod-text2);}
.modern .tab:hover{color:var(--mod-text);}
.modern .tab.active{color:var(--mod-accent);border-bottom-color:var(--mod-accent);}
.current .tab{color:var(--flow-text2);}
.current .tab:hover{color:var(--flow-text);}
.current .tab.active{color:var(--flow-accent);border-bottom-color:var(--flow-accent);}

.chapter-nav{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;border-bottom:1px solid;scrollbar-width:none;flex-wrap:wrap;}
.chapter-nav::-webkit-scrollbar{display:none;}
.parchment .chapter-nav{background:var(--parch-bg);border-color:var(--parch-border);}
.modern .chapter-nav{background:var(--mod-bg);border-bottom:0.5px solid var(--mod-border);}
.current .chapter-nav{background:var(--flow-bg);border-bottom:0.5px solid var(--flow-border);}

.ch-btn{border-radius:20px;padding:5px 14px;font-size:12px;cursor:pointer;white-space:nowrap;font-family:'Lato',sans-serif;font-weight:700;transition:all 0.2s;}
.parchment .ch-btn{background:rgba(139,69,19,0.12);border:1.5px solid #A0722A;color:#3A2008;}
.parchment .ch-btn:hover{background:var(--parch-accent);color:#fff;border-color:var(--parch-accent);}
.parchment .ch-btn.active{background:var(--parch-accent);color:#fff;border-color:var(--parch-accent);}
.modern .ch-btn{background:rgba(255,255,255,0.04);border:0.5px solid var(--mod-border);color:var(--mod-text2);}
.modern .ch-btn:hover{background:var(--mod-accent-dim);color:var(--mod-accent);border-color:rgba(201,100,66,0.3);}
.modern .ch-btn.active{background:var(--mod-accent-dim);color:var(--mod-accent);border-color:rgba(201,100,66,0.4);}
.current .ch-btn{background:rgba(0,194,204,0.05);border:0.5px solid var(--flow-border);color:var(--flow-text2);}
.current .ch-btn:hover{background:var(--flow-accent-dim);color:var(--flow-accent);border-color:var(--flow-border-mid);}
.current .ch-btn.active{background:var(--flow-accent-dim);color:var(--flow-accent);border-color:var(--flow-accent);}

.view-area{position:relative;min-height:70vh;}
.page-view,.notes-view{display:none;}
.page-view.active,.notes-view.active{display:block;}

.page-spread{position:relative;margin:20px 16px;border-radius:4px;min-height:65vh;padding:40px 48px;border:1px solid;overflow:hidden;user-select:text;}
.parchment .page-spread{background:var(--parch-page);border-color:var(--parch-border);box-shadow:3px 3px 12px rgba(139,69,19,0.15);}
.modern .page-spread{background:var(--mod-page);border:0.5px solid var(--mod-border);}
.current .page-spread{background:var(--flow-page);border:0.5px solid var(--flow-border);box-shadow:0 0 32px rgba(0,194,204,0.05);}

.page-spread::before{content:'';position:absolute;left:40px;top:0;bottom:0;width:1px;opacity:0.3;}
.parchment .page-spread::before{background:var(--parch-accent);}
.modern .page-spread::before{background:var(--mod-accent);}
.current .page-spread::before{background:var(--flow-accent);}

.chapter-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;font-family:'Lato',sans-serif;font-weight:700;}
.parchment .chapter-label{color:var(--parch-accent);}
.modern .chapter-label{color:var(--mod-accent);}
.current .chapter-label{color:var(--flow-accent);}

.page-heading{font-family:'EB Garamond',serif;font-size:28px;font-weight:600;line-height:1.2;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid;}
.parchment .page-heading{color:var(--parch-accent);border-color:var(--parch-border);}
.modern .page-heading{color:var(--mod-accent);border-bottom:0.5px solid var(--mod-border);}
.current .page-heading{color:var(--flow-accent);border-bottom:0.5px solid var(--flow-border);}

.sub-heading{font-family:'EB Garamond',serif;font-size:17px;font-weight:600;margin:22px 0 8px;font-style:italic;}
.parchment .sub-heading{color:var(--parch-accent);}
.modern .sub-heading{color:var(--mod-accent);}
.current .sub-heading{color:var(--flow-accent);}

.page-body{font-family:'EB Garamond',serif;font-size:17px;line-height:1.85;}
.parchment .page-body{color:var(--parch-text);}
.modern .page-body{color:var(--mod-text);}
.current .page-body{color:var(--flow-text);}
.page-body p{margin-bottom:14px;}
.page-body ul{padding-left:20px;margin-bottom:14px;}
.page-body li{margin-bottom:6px;}

.page-footer{display:flex;justify-content:space-between;align-items:center;margin-top:30px;padding-top:12px;border-top:1px solid;font-size:12px;}
.parchment .page-footer{border-color:var(--parch-border);color:var(--parch-text2);}
.modern .page-footer{border-top:0.5px solid var(--mod-border);color:var(--mod-text2);}
.current .page-footer{border-top:0.5px solid var(--flow-border);color:var(--flow-text2);}

.flip-zones{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;pointer-events:none;z-index:10;}
.flip-zone{flex:1;pointer-events:all;cursor:pointer;opacity:0;transition:opacity 0.2s;}
.flip-zone:hover{opacity:1;}
.flip-zone-left{display:flex;align-items:center;justify-content:flex-start;padding-left:8px;}
.flip-zone-right{display:flex;align-items:center;justify-content:flex-end;padding-right:8px;}
.flip-indicator{font-size:28px;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;}
.parchment .flip-indicator{background:rgba(139,69,19,0.15);color:var(--parch-accent);}
.modern .flip-indicator{background:rgba(201,100,66,0.12);color:var(--mod-accent);}
.current .flip-indicator{background:rgba(0,194,204,0.1);color:var(--flow-accent);}

.page-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:12px;}
.pnav-btn{background:none;border:1.5px solid;border-radius:8px;padding:8px 18px;font-size:14px;cursor:pointer;font-family:'Lato',sans-serif;font-weight:700;transition:all 0.2s;}
.parchment .pnav-btn{border-color:var(--parch-accent);color:var(--parch-accent);background:rgba(139,69,19,0.07);}
.parchment .pnav-btn:hover:not(:disabled){background:var(--parch-accent);color:#fff;}
.modern .pnav-btn{border:0.5px solid var(--mod-border);color:var(--mod-text2);background:rgba(255,255,255,0.03);}
.modern .pnav-btn:hover:not(:disabled){background:var(--mod-accent-dim);color:var(--mod-accent);border-color:rgba(201,100,66,0.35);}
.current .pnav-btn{border:0.5px solid var(--flow-border);color:var(--flow-text2);background:rgba(0,194,204,0.04);}
.current .pnav-btn:hover:not(:disabled){background:var(--flow-accent-dim);color:var(--flow-accent);border-color:var(--flow-border-mid);}
.pnav-btn:disabled{opacity:0.3;cursor:default;}
.page-indicator{font-size:13px;}
.parchment .page-indicator{color:var(--parch-text2);}
.modern .page-indicator{color:var(--mod-text2);}
.current .page-indicator{color:var(--flow-text2);}

/* notes */
.notes-view{padding:20px 16px;}
.notes-heading{font-family:'EB Garamond',serif;font-size:24px;font-weight:600;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid;}
.parchment .notes-heading{color:var(--parch-accent);border-color:var(--parch-border);}
.modern .notes-heading{color:var(--mod-accent);border-bottom:0.5px solid var(--mod-border);}
.current .notes-heading{color:var(--flow-accent);border-bottom:0.5px solid var(--flow-border);}
.notes-chapter-group{margin-bottom:24px;}
.notes-chapter-title{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid;}
.parchment .notes-chapter-title{color:var(--parch-accent);border-color:var(--parch-border);}
.modern .notes-chapter-title{color:var(--mod-accent);border-bottom:0.5px solid var(--mod-border);}
.current .notes-chapter-title{color:var(--flow-accent);border-bottom:0.5px solid var(--flow-border);}
.note-card{border:1px solid;border-radius:8px;padding:12px 14px;margin-bottom:10px;position:relative;}
.parchment .note-card{background:var(--parch-page);border-color:var(--parch-border);}
.modern .note-card{background:var(--mod-page);border:0.5px solid var(--mod-border);}
.current .note-card{background:var(--flow-page);border:0.5px solid var(--flow-border);}
.note-type-badge{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:12px;display:inline-block;margin-bottom:6px;}
.badge-page{background:rgba(139,69,19,0.15);color:#6B2F00;}
.modern .badge-page{background:rgba(201,100,66,0.15);color:#C96442;}
.current .badge-page{background:rgba(0,194,204,0.12);color:#00C2CC;}
.badge-chapter{background:rgba(80,160,80,0.15);color:#2D6A2D;}
.modern .badge-chapter{background:rgba(93,202,165,0.12);color:#5DCAA5;}
.current .badge-chapter{background:rgba(93,202,165,0.12);color:#5DCAA5;}
.badge-book{background:rgba(80,80,200,0.1);color:#3A3AA0;}
.modern .badge-book{background:rgba(133,183,235,0.12);color:#85B7EB;}
.current .badge-book{background:rgba(133,183,235,0.12);color:#85B7EB;}
.note-text{font-family:'EB Garamond',serif;font-size:15px;line-height:1.6;}
.parchment .note-text{color:var(--parch-text);}
.modern .note-text{color:var(--mod-text);}
.current .note-text{color:var(--flow-text);}
.note-meta{font-size:11px;margin-top:6px;}
.parchment .note-meta{color:var(--parch-text2);}
.modern .note-meta{color:var(--mod-text2);}
.current .note-meta{color:var(--flow-text2);}
.delete-note-btn{position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;font-size:16px;opacity:0.4;transition:opacity 0.2s;}
.delete-note-btn:hover{opacity:1;}
.empty-notes{text-align:center;padding:40px;font-family:'EB Garamond',serif;font-size:16px;font-style:italic;opacity:0.5;}

/* floating note btn */
.floating-note-btn{position:fixed;bottom:24px;right:24px;z-index:200;border:none;border-radius:50px;padding:12px 20px;font-size:14px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,0.25);transition:all 0.2s;}
.parchment .floating-note-btn{background:var(--parch-accent);color:#fff;}
.modern .floating-note-btn{background:var(--mod-accent);color:#F0EDE6;}
.current .floating-note-btn{background:var(--flow-accent);color:#0D1F2D;}
.floating-note-btn:hover{transform:scale(1.05);}

/* modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal-box{border-radius:12px;padding:24px;width:100%;max-width:420px;}
.parchment .modal-box{background:var(--parch-page);border:1px solid var(--parch-border);}
.modern .modal-box{background:var(--mod-page);border:0.5px solid var(--mod-border);}
.current .modal-box{background:var(--flow-page);border:0.5px solid var(--flow-border);}
.modal-title{font-family:'EB Garamond',serif;font-size:20px;font-weight:600;margin-bottom:16px;}
.parchment .modal-title{color:var(--parch-accent);}
.modern .modal-title{color:var(--mod-accent);}
.current .modal-title{color:var(--flow-accent);}
.note-type-selector{display:flex;gap:8px;margin-bottom:14px;}
.note-type-btn{flex:1;border:1.5px solid;border-radius:8px;padding:8px;font-size:13px;cursor:pointer;font-family:'Lato',sans-serif;font-weight:700;text-align:center;transition:all 0.2s;background:none;}
.parchment .note-type-btn{border-color:var(--parch-border);color:#3A2008;}
.parchment .note-type-btn.selected{background:var(--parch-accent);color:#fff;border-color:var(--parch-accent);}
.modern .note-type-btn{border:0.5px solid var(--mod-border);color:var(--mod-text2);}
.modern .note-type-btn.selected{background:var(--mod-accent-dim);color:var(--mod-accent);border-color:rgba(201,100,66,0.4);}
.current .note-type-btn{border:0.5px solid var(--flow-border);color:var(--flow-text2);}
.current .note-type-btn.selected{background:var(--flow-accent-dim);color:var(--flow-accent);border-color:var(--flow-accent);}
.modal-desc{font-size:12px;margin-bottom:12px;font-style:italic;min-height:18px;}
.parchment .modal-desc{color:var(--parch-text2);}
.modern .modal-desc{color:var(--mod-text2);}
.current .modal-desc{color:var(--flow-text2);}
.note-textarea{width:100%;border:1px solid;border-radius:8px;padding:10px 12px;font-family:'EB Garamond',serif;font-size:15px;line-height:1.6;resize:vertical;min-height:100px;outline:none;transition:border-color 0.2s;}
.parchment .note-textarea{background:var(--parch-bg);color:var(--parch-text);border-color:var(--parch-border);}
.parchment .note-textarea:focus{border-color:var(--parch-accent);}
.modern .note-textarea{background:var(--mod-bg);color:var(--mod-text);border:0.5px solid var(--mod-border);}
.modern .note-textarea:focus{border-color:rgba(201,100,66,0.5);}
.current .note-textarea{background:var(--flow-bg);color:var(--flow-text);border:0.5px solid var(--flow-border);}
.current .note-textarea:focus{border-color:var(--flow-accent);}
.modal-actions{display:flex;gap:8px;margin-top:14px;}
.btn-save{flex:1;border:none;border-radius:8px;padding:10px;font-size:14px;font-weight:700;font-family:'Lato',sans-serif;cursor:pointer;transition:all 0.2s;}
.parchment .btn-save{background:var(--parch-accent);color:#fff;}
.modern .btn-save{background:var(--mod-accent);color:#F0EDE6;}
.current .btn-save{background:var(--flow-accent);color:#0D1F2D;}
.btn-cancel{border:1.5px solid;border-radius:8px;padding:10px 16px;font-size:14px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer;background:none;transition:all 0.2s;}
.parchment .btn-cancel{border-color:var(--parch-border);color:#3A2008;}
.modern .btn-cancel{border:0.5px solid var(--mod-border);color:var(--mod-text2);}
.current .btn-cancel{border:0.5px solid var(--flow-border);color:var(--flow-text2);}

/* highlight */
.highlight-toolbar{position:fixed;z-index:400;display:none;background:#fff;border:1px solid #ddd;border-radius:8px;padding:6px 10px;gap:8px;align-items:center;box-shadow:0 4px 16px rgba(0,0,0,0.15);}
.highlight-toolbar.visible{display:flex;}
.hl-color-btn{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform 0.15s;}
.hl-color-btn:hover{transform:scale(1.2);border-color:#333;}
.hl-color-btn.yellow{background:#FFD700;}
.hl-color-btn.green{background:#50C864;}
.hl-color-btn.pink{background:#E060CC;}
.hl-color-btn.blue{background:#50A0FF;}
.hl-clear-btn{font-size:16px;background:none;border:none;cursor:pointer;color:#888;padding:0 2px;line-height:1;}
.hl-clear-btn:hover{color:#333;}
mark.highlight-yellow{background:rgba(255,220,0,0.45);border-radius:2px;}
mark.highlight-green{background:rgba(80,200,100,0.35);border-radius:2px;}
mark.highlight-pink{background:rgba(200,100,220,0.35);border-radius:2px;}
mark.highlight-blue{background:rgba(80,160,255,0.3);border-radius:2px;}

.view-notes-inline-btn{display:inline-flex;align-items:center;gap:4px;font-size:12px;border:1.5px solid;border-radius:12px;padding:3px 10px;cursor:pointer;background:none;font-family:'Lato',sans-serif;font-weight:700;transition:all 0.2s;margin-left:8px;vertical-align:middle;}
.parchment .view-notes-inline-btn{border-color:var(--parch-accent);color:var(--parch-accent);}
.parchment .view-notes-inline-btn:hover{background:var(--parch-accent);color:#fff;}
.modern .view-notes-inline-btn{border:0.5px solid var(--mod-border);color:var(--mod-accent);}
.modern .view-notes-inline-btn:hover{background:var(--mod-accent-dim);border-color:rgba(201,100,66,0.35);}
.current .view-notes-inline-btn{border:0.5px solid var(--flow-border);color:var(--flow-accent);}
.current .view-notes-inline-btn:hover{background:var(--flow-accent-dim);border-color:var(--flow-accent);}

/* page flip animation */
#page-content{transition:none;}
#page-content.exit-left{animation:exitLeft 0.18s cubic-bezier(0.4,0,1,1) forwards;}
#page-content.exit-right{animation:exitRight 0.18s cubic-bezier(0.4,0,1,1) forwards;}
#page-content.enter-left{animation:enterLeft 0.28s cubic-bezier(0,0,0.2,1) forwards;}
#page-content.enter-right{animation:enterRight 0.28s cubic-bezier(0,0,0.2,1) forwards;}
@keyframes exitLeft{from{opacity:1;transform:translateX(0) scale(1);}to{opacity:0;transform:translateX(-38px) scale(0.97);}}
@keyframes exitRight{from{opacity:1;transform:translateX(0) scale(1);}to{opacity:0;transform:translateX(38px) scale(0.97);}}
@keyframes enterLeft{from{opacity:0;transform:translateX(48px) scale(0.98);}to{opacity:1;transform:translateX(0) scale(1);}}
@keyframes enterRight{from{opacity:0;transform:translateX(-48px) scale(0.98);}to{opacity:1;transform:translateX(0) scale(1);}}

/* lib screen fade in */
@keyframes libFadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.book-grid{animation:libFadeIn 0.3s ease both;}

/* ── LIBRARY TAB BAR ── */
.lib-tab-bar{display:flex;gap:2px;padding:0 0;border-bottom:2px solid;margin-top:0;}
.parchment .lib-tab-bar{border-color:var(--parch-border);background:var(--parch-tab);}
.modern .lib-tab-bar{background:var(--mod-tab);border-bottom:0.5px solid var(--mod-border);}
.current .lib-tab-bar{background:var(--flow-tab);border-bottom:0.5px solid var(--flow-border);}
.lib-tab{padding:11px 22px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:none;font-family:'Lato',sans-serif;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.2s;letter-spacing:0.3px;}
.parchment .lib-tab{color:#3A2008;}
.parchment .lib-tab:hover{color:var(--parch-accent);}
.parchment .lib-tab.active{color:var(--parch-accent);border-bottom-color:var(--parch-accent);}
.modern .lib-tab{color:var(--mod-text2);}
.modern .lib-tab:hover{color:var(--mod-text);}
.modern .lib-tab.active{color:var(--mod-accent);border-bottom-color:var(--mod-accent);}
.current .lib-tab{color:var(--flow-text2);}
.current .lib-tab:hover{color:var(--flow-text);}
.current .lib-tab.active{color:var(--flow-accent);border-bottom-color:var(--flow-accent);}

/* ── ALL NOTES PANEL ── */
.lib-panel{display:none;}
.lib-panel.active{display:block;}

.all-notes-container{max-width:860px;margin:0 auto;padding:28px 16px 60px;}
.all-notes-heading{font-family:'EB Garamond',serif;font-size:28px;font-weight:600;margin-bottom:6px;}
.parchment .all-notes-heading{color:var(--parch-accent);}
.modern .all-notes-heading{color:var(--mod-accent);}
.current .all-notes-heading{color:var(--flow-accent);}
.all-notes-sub{font-size:14px;opacity:0.6;margin-bottom:24px;}

/* book notes row in all-notes list */
.book-notes-row{border:1px solid;border-radius:12px;padding:18px 20px;margin-bottom:14px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.parchment .book-notes-row{background:var(--parch-page);border-color:var(--parch-border);}
.parchment .book-notes-row:hover{box-shadow:0 6px 24px rgba(139,69,19,0.15);transform:translateY(-2px);border-color:var(--parch-accent);}
.modern .book-notes-row{background:var(--mod-page);border:0.5px solid var(--mod-border);}
.modern .book-notes-row:hover{background:#2E2D2A;transform:translateY(-2px);border-color:var(--mod-border-mid);}
.current .book-notes-row{background:var(--flow-page);border:0.5px solid var(--flow-border);}
.current .book-notes-row:hover{background:#163348;transform:translateY(-2px);border-color:var(--flow-accent);}

.bnr-spine{width:4px;height:100%;position:absolute;left:0;top:0;border-radius:12px 0 0 12px;}
.bnr-body{padding-left:8px;}
.bnr-domain{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.parchment .bnr-domain{color:var(--parch-accent);}
.modern .bnr-domain{color:var(--mod-accent);}
.current .bnr-domain{color:var(--flow-accent);}
.bnr-title{font-family:'EB Garamond',serif;font-size:19px;font-weight:600;margin-bottom:8px;}
.parchment .bnr-title{color:var(--parch-text);}
.modern .bnr-title{color:var(--mod-text);}
.current .bnr-title{color:var(--flow-text);}
.bnr-counts{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;margin-bottom:10px;}
.parchment .bnr-counts{color:var(--parch-text2);}
.modern .bnr-counts{color:var(--mod-text2);}
.current .bnr-counts{color:var(--flow-text2);}
.bnr-open{font-size:12px;font-weight:700;letter-spacing:0.5px;display:flex;align-items:center;gap:4px;transition:gap 0.2s;}
.parchment .bnr-open{color:var(--parch-accent);}
.modern .bnr-open{color:var(--mod-accent);}
.current .bnr-open{color:var(--flow-accent);}
.book-notes-row:hover .bnr-open{gap:8px;}

.all-notes-empty{text-align:center;padding:60px 20px;font-family:'EB Garamond',serif;font-size:18px;font-style:italic;opacity:0.5;}

/* ── BOOK NOTES DETAIL SCREEN ── */
.book-notes-detail-topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px;}
.parchment .book-notes-detail-topbar{background:var(--parch-tab);border-color:var(--parch-border);}
.modern .book-notes-detail-topbar{background:var(--mod-tab);border-bottom:0.5px solid var(--mod-border);}
.current .book-notes-detail-topbar{background:var(--flow-tab);border-bottom:0.5px solid var(--flow-border);}

.book-notes-toggle-bar{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid;flex-shrink:0;}
.parchment .book-notes-toggle-bar{background:var(--parch-bg);border-color:var(--parch-border);}
.modern .book-notes-toggle-bar{background:var(--mod-bg);border-bottom:0.5px solid var(--mod-border);}
.current .book-notes-toggle-bar{background:var(--flow-bg);border-bottom:0.5px solid var(--flow-border);}
.bntog{flex:1;border:1.5px solid;border-radius:8px;padding:8px 0;font-size:13px;font-weight:700;text-align:center;cursor:pointer;background:none;font-family:'Lato',sans-serif;transition:all 0.2s;max-width:140px;}
.parchment .bntog{border-color:var(--parch-border);color:#3A2008;}
.parchment .bntog.active{background:var(--parch-accent);color:#fff;border-color:var(--parch-accent);}
.modern .bntog{border:0.5px solid var(--mod-border);color:var(--mod-text2);}
.modern .bntog.active{background:var(--mod-accent-dim);color:var(--mod-accent);border-color:rgba(201,100,66,0.4);}
.current .bntog{border:0.5px solid var(--flow-border);color:var(--flow-text2);}
.current .bntog.active{background:var(--flow-accent-dim);color:var(--flow-accent);border-color:var(--flow-accent);}

.book-notes-detail-content{max-width:780px;margin:0 auto;padding:20px 16px 60px;}

.open-in-book-btn{font-size:11px;font-weight:700;border:1.5px solid;border-radius:8px;padding:4px 11px;cursor:pointer;background:none;font-family:'Lato',sans-serif;transition:all 0.2s;white-space:nowrap;}
.parchment .open-in-book-btn{border-color:var(--parch-accent);color:var(--parch-accent);}
.parchment .open-in-book-btn:hover{background:var(--parch-accent);color:#fff;}
.modern .open-in-book-btn{border:0.5px solid var(--mod-border);color:var(--mod-accent);}
.modern .open-in-book-btn:hover{background:var(--mod-accent-dim);border-color:rgba(201,100,66,0.4);}
.current .open-in-book-btn{border:0.5px solid var(--flow-border);color:var(--flow-accent);}
.current .open-in-book-btn:hover{background:var(--flow-accent-dim);border-color:var(--flow-accent);}

.note-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;flex-wrap:wrap;gap:6px;}

@media(max-width:600px){
  .page-spread{padding:24px 20px;margin:12px 8px;}
  .page-spread::before{left:16px;}
  .page-heading{font-size:22px;}
  .page-body{font-size:16px;}
  .book-title-bar{font-size:14px;}
  .floating-note-btn{bottom:16px;right:16px;padding:10px 16px;font-size:13px;}
  .chapter-nav{padding:8px 10px;}
  .book-grid{grid-template-columns:1fr;}
  .lib-heading{font-size:24px;}
}
</style>
</head>
<body>
<div id="app" class="parchment">

  <!-- ══════ LIBRARY SCREEN ══════ -->
  <div id="screen-library" class="screen active">
    <div class="lib-topbar">
      <span class="lib-wordmark">&#128218; My Library</span>
      <div class="lib-topbar-controls">
        <button class="icon-btn" onclick="cycleLibTheme()" id="lib-theme-btn">&#127774; Parchment</button>
      </div>
    </div>

    <!-- Library tab bar -->
    <div class="lib-tab-bar">
      <button class="lib-tab active" onclick="libTab('books', this)">&#128214; Books</button>
      <button class="lib-tab" onclick="libTab('notes', this)">&#128211; All Notes</button>
    </div>

    <!-- BOOKS PANEL -->
    <div id="lib-panel-books" class="lib-panel active">
      <div class="lib-container">
        <div class="lib-heading">Your Books</div>
        <div class="lib-sub" id="lib-sub">2 books &middot; Open one to start reading</div>
        <div class="book-grid" id="book-grid"></div>
      </div>
    </div>

    <!-- ALL NOTES PANEL -->
    <div id="lib-panel-notes" class="lib-panel">
      <div class="all-notes-container">
        <div class="all-notes-heading">All Notes</div>
        <div class="all-notes-sub" id="all-notes-sub">Notes across your library, grouped by book</div>
        <div id="all-notes-list"></div>
      </div>
    </div>
