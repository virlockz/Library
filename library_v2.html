    chapters: [
      { id:'intro', title:'Introduction', label:'Introduction', pages:[
        { heading:'In The Zone', label:'Introduction', body:`<p>There is a state every athlete, musician, writer, and surgeon has touched at least once \u2014 a moment when effort disappeared, time warped, and everything simply worked. Athletes call it being in the zone. Psychologists call it flow. Whatever you call it, you remember it.</p><p>This is not a book about motivation or hustle. It is a book about a specific, measurable neurological state that represents the peak of human performance \u2014 one that science has been quietly mapping for decades, and that you can learn to enter deliberately.</p><p>Mihaly Csikszentmihalyi first named and studied flow in the 1970s after interviewing rock climbers, chess players, surgeons, and factory workers about the moments they felt most alive. The answer was always the same: total absorption in a difficult task. Steven Kotler and the Flow Research Collective have since mapped the neurobiology in extraordinary detail. What they found changed everything we thought we knew about human potential.</p><p>The chapters that follow cover the full picture \u2014 from what is happening in your brain during flow, to the neurochemistry that transforms your body, to the precise conditions that trigger the state and how to build them deliberately into your life.</p>` }
      ]},
      { id:'what-is-flow', title:'What Flow Actually Is', label:'Chapter I', pages:[
        { heading:'What Flow Actually Is', label:'Chapter I \u00b7 Part 1', body:`<p>Flow is defined as an almost automatic, effortless, yet highly focused state of consciousness that arises when a skilled person engages fully with a sufficiently challenging task. That definition is precise for a reason \u2014 every word in it matters.</p><p><em>Almost automatic</em> \u2014 not fully automatic. There is still conscious engagement, but it runs without friction. <em>Effortless</em> \u2014 not easy. The task is hard. The effortlessness is in how the mind meets that hardness. <em>Highly focused</em> \u2014 attention is not scattered or divided. It is locked in, entirely, on the present moment.</p><div class="sub-heading">The nine characteristics</div><p>Csikszentmihalyi identified nine consistent features reported by people in flow across cultures and disciplines. You do not need all nine to be in flow, but you will recognise the pattern.</p><ul><li><strong>Complete concentration</strong> \u2014 total absorption in the task, no bandwidth left for distraction</li><li><strong>Merging of action and awareness</strong> \u2014 you are not watching yourself do the thing; you are simply doing it</li><li><strong>Loss of self-consciousness</strong> \u2014 the inner critic goes quiet; there is no mental commentary</li><li><strong>Distorted time perception</strong> \u2014 time either collapses or stretches; you lose track of it entirely</li><li><strong>Autotelic experience</strong> \u2014 the activity is intrinsically rewarding; you do not need an external reason to continue</li></ul>` },
        { heading:'What Flow Actually Is', label:'Chapter I \u00b7 Part 2', body:`<ul><li><strong>Clear goals</strong> \u2014 you know what success looks like moment to moment</li><li><strong>Immediate feedback</strong> \u2014 you know in real time whether you are succeeding or failing</li><li><strong>Challenge-skill balance</strong> \u2014 the task is hard enough to demand full attention but achievable enough to avoid panic</li><li><strong>Sense of personal control</strong> \u2014 not certainty of outcome, but confidence that your responses are adequate to the challenge</li></ul><div class="sub-heading">What flow is not</div><p>Flow is not relaxation. It is not daydreaming. It is not the comfort of doing something easy. It is also not the anxiety of being overwhelmed. It sits in the narrow corridor between boredom and panic \u2014 a corridor that the brain finds intensely rewarding to occupy.</p><p>It is also not mystical. The state has measurable neural correlates, a consistent neurochemical signature, and reproducible trigger conditions. The fact that it feels transcendent does not mean it is beyond explanation. It means the brain, at its best, is a more extraordinary instrument than most people ever discover.</p>` }
      ]},
      { id:'brain-in-flow', title:'The Brain in Flow', label:'Chapter II', pages:[
        { heading:'The Brain in Flow', label:'Chapter II \u00b7 Part 1', body:`<p>The most important thing to understand about the brain in flow is what goes offline. Most accounts of peak performance focus on what activates. The deeper story is about what deactivates \u2014 and why that deactivation is the source of everything flow produces.</p><div class="sub-heading">Transient hypofrontality</div><p>In 2004, neuroscientist Arne Dietrich proposed the transient hypofrontality hypothesis: during flow, the prefrontal cortex \u2014 the brain\u2019s seat of self-monitoring, self-criticism, rumination, and executive overthinking \u2014 temporarily downregulates. <em>Hypo</em> means under-active. <em>Frontal</em> refers to the prefrontal cortex. <em>Transient</em> means temporary.</p><p>This has since been confirmed by fMRI studies, including Charles Limb\u2019s landmark 2008 research at Johns Hopkins, where jazz musicians improvising in the scanner showed clear deactivation of the dorsolateral prefrontal cortex \u2014 the region responsible for self-monitoring \u2014 during moments of creative flow.</p><p>The inner critic is not a metaphor. It is a specific brain region. And in flow, it goes quiet.</p>` },
        { heading:'The Brain in Flow', label:'Chapter II \u00b7 Part 2', body:`<div class="sub-heading">The synchronisation theory</div><p>A competing theory \u2014 the Synchronisation Theory of Flow \u2014 proposes that flow emerges not just from deactivation but from enhanced coordination between brain networks. Specifically, increased coherence between the frontoparietal attentional networks and the dopaminergic reward systems creates a state of integrated, efficient processing that feels effortless precisely because everything is working together rather than competing.</p><p>Both theories are likely partially correct. Flow probably involves simultaneous downregulation of self-referential processing and upregulation of integrated, task-focused neural coordination.</p><div class="sub-heading">Brainwave patterns</div><p>EEG studies consistently show that flow is associated with increased alpha and theta wave activity, particularly in frontal regions. Alpha waves (8\u201312 Hz) are associated with relaxed alertness and creative access. Theta waves (4\u20138 Hz) are associated with deep absorption and the loosening of associative boundaries. The combination produces a state of focused creativity that normal waking consciousness rarely achieves.</p><p>This is not relaxation. Alpha and theta dominance in flow coexist with high performance output \u2014 which is what makes the state so unusual. The brain is simultaneously calm and highly capable.</p>` }
      ]},
      { id:'neurochemistry', title:'The Neurochemical Cocktail', label:'Chapter III', pages:[
        { heading:'The Neurochemical Cocktail', label:'Chapter III \u00b7 Part 1', body:`<p>Flow is the only psychological state known to trigger the simultaneous release of all five of the brain\u2019s primary performance-enhancing neurochemicals. Understanding what each one does explains why the state feels the way it does \u2014 and why its effects on performance are so dramatic.</p><div class="sub-heading">Dopamine</div><p>Dopamine is the brain\u2019s signal for \u201cthis matters, pay attention.\u201d It sharpens focus, accelerates pattern recognition, and drives continued engagement. In flow, dopamine release is sustained rather than pulsed \u2014 which is why the state can maintain itself across extended periods. Dopamine also lowers the signal-to-noise ratio in neural processing, making you better at filtering relevant information from irrelevant information in real time.</p><div class="sub-heading">Norepinephrine</div><p>Norepinephrine is the brain\u2019s alertness and arousal signal. It speeds neural transmission, tightens reaction time, and increases neuromuscular efficiency. In flow, norepinephrine is what gives your movements their precision and your reactions their speed. It is also what creates the heightened sense of aliveness \u2014 the feeling that everything is vivid and immediate.</p>` },
        { heading:'The Neurochemical Cocktail', label:'Chapter III \u00b7 Part 2', body:`<div class="sub-heading">Anandamide</div><p>Anandamide is the brain\u2019s endogenous cannabinoid \u2014 it binds to the same receptors as THC. It dramatically reduces the perception of pain and effort, enhances lateral thinking by loosening associative boundaries, and creates the sense of ease and expansiveness that flow is famous for. Anandamide is also why flow states can sustain output far beyond what conscious effort normally allows \u2014 the effort ceiling rises because the perception of effort drops.</p><div class="sub-heading">Serotonin</div><p>Serotonin contributes the emotional tone of flow \u2014 the quiet confidence, the sense of rightness, the absence of the anxiety that normally accompanies difficult challenges. It is the neurochemical of wellbeing, and its presence in flow is what makes the state feel not just high-performing but genuinely good.</p><div class="sub-heading">Endorphins</div><p>Endorphins are the brain\u2019s pain-suppression and pleasure system. They are what allow athletes in flow to play through injuries they do not notice until afterward, and what contribute to the euphoric quality that people describe when reflecting on their deepest flow experiences. The combination of all five of these neurochemicals \u2014 simultaneously \u2014 is what makes flow not just a performance state but one of the most powerful altered states the human brain can produce without external substances.</p>` }
      ]},
      { id:'flow-body', title:'Flow and the Body', label:'Chapter IV', pages:[
        { heading:'Flow and the Body', label:'Chapter IV \u00b7 Part 1', body:`<p>Most discussions of flow focus on the mind. The physical dimension is equally extraordinary \u2014 and less understood. Flow does not just change how you think. It changes what your body can do.</p><div class="sub-heading">Strength and power output</div><p>Norepinephrine and dopamine together increase neuromuscular efficiency. Your motor neurons fire more cleanly, recruit muscle fibres more completely, and produce greater force with the same metabolic cost. The prefrontal cortex is partly responsible for what exercise physiologists call the \u201cgovernor effect\u201d \u2014 the brain\u2019s tendency to throttle muscle output before true physiological failure, as a protective mechanism. In flow, with the prefrontal cortex downregulated, this governor loosens. The brain allows the body to access reserves it normally keeps off-limits.</p><div class="sub-heading">Stamina and endurance</div><p>Anandamide significantly reduces perceived effort and pain. This means the same physiological output feels easier in flow than it does in normal states. The practical result is that you can sustain higher intensity for longer, not because your body changes, but because the brain\u2019s reporting of what the body is experiencing changes. Studies on flow in endurance athletes consistently show sustained output well past normal fatigue thresholds during flow states.</p>` },
        { heading:'Flow and the Body', label:'Chapter IV \u00b7 Part 2', body:`<div class="sub-heading">Fast-twitch recruitment and reaction time</div><p>Norepinephrine speeds neural transmission throughout the nervous system. In athletic flow specifically, this manifests as accelerated pattern recognition \u2014 you read the play, the opponent\u2019s movement, the ball\u2019s trajectory before conscious thought catches up. This is the famous \u201cslow motion\u201d effect athletes describe. The game does not actually slow down. Your processing accelerates so dramatically that you have more perceived time to respond to the same stimulus.</p><p>Fast-twitch muscle fibres respond to neural signals. When those signals arrive faster and more cleanly, recruitment improves. Flow is essentially an optimised neural environment for explosive movement.</p><div class="sub-heading">Movement quality and coordination</div><p>With the inner critic offline, movement patterns stored in the cerebellum and basal ganglia \u2014 the brain\u2019s procedural memory systems \u2014 run without interference. This is why overthinking your technique during competition destroys it: conscious instruction from the prefrontal cortex layers on top of trained motor programmes and creates noise. In flow, that interference disappears. Practised skills execute more cleanly than they ever do under deliberate conscious control.</p><p>This is why elite performers often say their best performances felt effortless. They were not trying harder. They were interfering less.</p>` }
      ]},
      { id:'entry-conditions', title:'The Four Entry Conditions', label:'Chapter V', pages:[
        { heading:'The Four Entry Conditions', label:'Chapter V \u00b7 Part 1', body:`<p>Flow does not happen randomly. It has consistent preconditions \u2014 four in particular that appear to be non-negotiable. Engineering these conditions is the foundation of any deliberate flow practice.</p><div class="sub-heading">Challenge-skill balance</div><p>This is the most fundamental condition, and the one Csikszentmihalyi placed at the centre of his original model. The task must sit at the edge of your current ability \u2014 hard enough to demand complete attention, achievable enough to prevent shutdown into anxiety. The sweet spot, based on research by the Flow Research Collective, is roughly 4% above your current skill ceiling.</p><p>Below that threshold, the brain gets bored and disengages. Above it, the prefrontal cortex floods with threat-response activity and flow becomes impossible. The narrow corridor between these two states is where the brain finds flow \u2014 and finds it almost compulsively, because the neurochemical reward for being there is extraordinary.</p><div class="sub-heading">Clear goals</div><p>The brain needs to know what success looks like moment to moment. Not vague aspirations \u2014 specific, immediate targets. In sport this is built in: make the shot, defend the drive, execute the play. In cognitive work, you must manufacture this clarity deliberately. Breaking a large project into a specific, achievable micro-goal for the current session is not productivity advice. It is a neurological prerequisite for flow.</p>` },
        { heading:'The Four Entry Conditions', label:'Chapter V \u00b7 Part 2', body:`<div class="sub-heading">Immediate feedback</div><p>The brain needs to know in real time whether it is succeeding or failing. Feedback closes the loop that allows moment-to-moment adjustment. Without it, the prefrontal cortex stays online to monitor and evaluate \u2014 which prevents the downregulation that flow requires. Sport provides this automatically. The ball goes in or it does not. For knowledge work, creating tight feedback loops \u2014 writing and immediately reviewing, solving then checking, testing then seeing results \u2014 is how you approximate this condition.</p><div class="sub-heading">Removal of distraction</div><p>The prefrontal cortex needs permission to quiet down. Notifications, context-switching, social interruptions, and ambient digital noise all keep it active \u2014 monitoring, evaluating, redirecting. Every interruption not only breaks the current session but resets the neurochemical build-up that precedes flow onset. Research suggests it takes an average of 23 minutes to return to deep focus after an interruption.</p><p>A distraction-free environment is not a luxury. It is a physiological requirement for the state. The most effective practitioners of flow treat their focus sessions with the same environmental seriousness that athletes treat competition.</p>` }
      ]},
      { id:'flow-triggers', title:'Flow Triggers', label:'Chapter VI', pages:[
        { heading:'Flow Triggers', label:'Chapter VI \u00b7 Part 1', body:`<p>Beyond the four entry conditions, Steven Kotler\u2019s research at the Flow Research Collective has identified a broader set of flow triggers \u2014 environmental, psychological, and social factors that reliably increase the probability of entering the state. Understanding them explains why certain activities, settings, and practices consistently produce flow while others rarely do.</p><div class="sub-heading">High consequences</div><p>Real stakes focus the mind in a way that manufactured urgency cannot. When the outcome matters \u2014 genuinely matters \u2014 the brain allocates full attentional resources to the present moment. There is no bandwidth for rumination about the past or anxiety about the future. This is one of the reasons extreme sports are such powerful flow vehicles: the consequence of failure is immediate and physical, which forces total presence.</p><p>In less extreme contexts, consequence can be created by raising the stakes of your work \u2014 public commitments, accountability structures, real deadlines with real costs. The brain responds to genuine consequence with the kind of focused arousal that primes flow.</p><div class="sub-heading">Deep embodiment</div><p>Physical full-body engagement is one of the most reliable flow triggers that exists. When proprioception, balance, coordination, and sensory input are all fully engaged simultaneously, the brain\u2019s attentional resources converge on the body and its environment. This is why flow is so common in physical disciplines \u2014 the body itself becomes the focus object that displaces self-referential thought.</p>` },
        { heading:'Flow Triggers', label:'Chapter VI \u00b7 Part 2', body:`<div class="sub-heading">Rich environment</div><p>Novelty, complexity, and unpredictability all drive norepinephrine release, which is one of the key neurochemicals in flow onset. A rich environment \u2014 one that keeps presenting new information, new problems, new configurations \u2014 keeps the brain in the alert, curious state that borders on flow. This is why basketball is such a powerful flow vehicle: the environment is constantly changing, every possession presents a novel configuration, and the unpredictability of opponents and teammates demands continuous real-time adaptation.</p><div class="sub-heading">Pattern recognition</div><p>Flow is dramatically more accessible in domains where you have developed genuine expertise. The challenge-skill balance requires that the skill side of the equation is real \u2014 and deep pattern recognition, built through thousands of hours of practice, is what makes the highest-challenge environments flowable rather than overwhelming. A beginner cannot flow on a basketball court at high intensity. An expert can. The difference is the depth of the pattern library that allows automatic, intuitive response to complex, fast-moving situations.</p><div class="sub-heading">Why basketball is a flow laboratory</div><p>Basketball contains almost every flow trigger simultaneously: high consequences, deep embodiment, an extraordinarily rich and unpredictable environment, constant immediate feedback, clear moment-to-moment goals, and a challenge level that scales precisely with skill. It is one of the most flow-dense activities humans have designed \u2014 which is not an accident. The activities humans find most compelling are almost always the ones most likely to produce flow.</p>` }
      ]},
      { id:'flow-practice', title:'Building Your Flow Practice', label:'Chapter VII', pages:[
        { heading:'Building Your Flow Practice', label:'Chapter VII \u00b7 Part 1', body:`<p>Flow is not something that happens to you. At the level of casual experience, it might seem that way \u2014 an unexpected session where everything clicked. But at the level of a deliberate practice, flow is something you build conditions for, enter systematically, and recover from intentionally. The difference between someone who stumbles into flow occasionally and someone who accesses it reliably is architecture.</p><div class="sub-heading">The pre-flow ritual</div><p>The nervous system responds to consistency. A repeated pre-flow sequence \u2014 same environment, same warm-up, same signal \u2014 trains the brain to associate the ritual with the state. Over time, initiating the ritual begins to trigger the neurochemical priming that makes flow onset faster and more reliable. This is classical conditioning applied to neuroscience.</p><p>The ritual does not need to be elaborate. It needs to be consistent. The same playlist, the same physical preparation sequence, the same 10-minute warm-up routine before deep work. The brain learns: when this happens, that follows.</p><div class="sub-heading">The 90-minute window</div><p>Flow states tend to peak within a window of roughly 90 to 120 minutes of sustained engagement. This aligns with the brain\u2019s ultradian rhythm \u2014 a natural cycle of high and low neural activity that repeats throughout the day. Scheduling deep work or high-performance training sessions within this window, rather than attempting to sustain flow indefinitely, produces better outcomes and protects recovery.</p>` },
        { heading:'Building Your Flow Practice', label:'Chapter VII \u00b7 Part 2', body:`<div class="sub-heading">The cost of flow</div><p>Flow is neurochemically expensive. The simultaneous release of five performance-enhancing neurochemicals, combined with the sustained high-intensity neural activity of deep focus, depletes resources that require real recovery time. Attempting to force flow sessions back-to-back without recovery produces diminishing returns and eventually burnout.</p><p>The post-flow period \u2014 sometimes called the \u201cflow hangover\u201d \u2014 is characterised by fatigue, reduced motivation, and decreased cognitive performance. This is not weakness. It is neurological recovery. Protecting this period, rather than fighting it, is what allows consistent high-performance across days and weeks rather than just occasional peaks.</p><div class="sub-heading">Life architecture for flow</div><p>The practitioners who access flow most reliably are those who have arranged their lives to create the conditions for it consistently. Protected time blocks with no interruptions. Physical training that maintains the embodiment and challenge-skill balance required for athletic flow. Recovery practices \u2014 sleep, rest, deliberate downtime \u2014 that restore the neurochemical reserves flow depletes.</p><p>This is not about optimising every hour. It is about recognising that flow requires a particular kind of soil \u2014 and that cultivating that soil is the actual work. The sessions themselves are just the harvest.</p>` }
      ]},
      { id:'conclusion', title:'Conclusion', label:'Conclusion', pages:[
        { heading:'Flow as a Way of Being', label:'Conclusion', body:`<p>This book has covered flow as a neurological state, a biochemical event, a physical transformer, and a set of engineerable conditions. But the deepest truth about flow is not any of those things. It is this: the moments you have spent in flow are the moments you have been most fully alive.</p><p>Not performing. Not achieving. Alive \u2014 in the specific sense of being completely present, completely engaged, completely yourself in action rather than thought. The neurochemicals and the brainwaves are the mechanism. The experience is something else.</p><p>Csikszentmihalyi spent decades studying what makes life worth living. His answer, drawn from thousands of interviews across cultures and disciplines, was consistent: the moments people described as most meaningful were almost always flow moments. Not the moments of rest or reward, but the moments of full, absorbed engagement with something difficult and worth doing.</p><p>The practical implication is straightforward but profound. If you want more of what makes life feel worth living \u2014 build more conditions for flow. Choose challenges at the edge of your ability. Develop skills deeply enough to meet those challenges. Protect the focused time and environmental conditions the state requires. Recover intentionally so you can return.</p><p>Flow is not a performance hack. It is a signal. When you are in it, you are in the right relationship with what you are doing \u2014 fully committed, fully capable, fully present. The goal is not to optimise your flow metrics. The goal is to live in that relationship as often as possible. Everything else follows.</p>` }
      ]}
    ]
  }
];

let currentBookId = null;
let currentBook = null;
let allPages = [];
let currentPageIndex = 0;
let currentTheme = 'parchment';
let libTheme = 'parchment';
let currentTab = 'read';
let currentNoteType = 'page';
let savedHighlights = {};
let pendingSelection = null;
let notes = [];

function getStorage(k){try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;}}
function setStorage(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

//  LIBRARY
// ══════════════════════════════════════════════════════
const LIB_THEMES = ['parchment','modern'];
function cycleLibTheme(){
  libTheme = LIB_THEMES[(LIB_THEMES.indexOf(libTheme)+1)%LIB_THEMES.length];
  applyTheme(libTheme);
  const labels = {'parchment':'\uD83D\uDD6F Parchment','modern':'\u2736 Modern'};
  document.getElementById('lib-theme-btn').textContent = labels[libTheme];
}

function renderLibrary(){
  const grid = document.getElementById('book-grid');
  grid.innerHTML = '';
  BOOKS.forEach(book => {
    const chapterCount = book.chapters.length;
    const pageCount = book.chapters.reduce((a,c)=>a+c.pages.length,0);
    const noteCount = (getStorage('notes_'+book.id)||[]).length;
    const spineColor = book.defaultTheme === 'current' ? 'var(--flow-accent)' : book.defaultTheme === 'modern' ? 'var(--mod-accent)' : book.defaultTheme === 'veil' ? 'var(--veil-accent)' : 'var(--parch-accent)';
    const themeLabel = {parchment:'Parchment',modern:'Modern',current:'Current',veil:'Veil'}[book.defaultTheme] || 'Parchment';
    const themeDot = {parchment:'#8B4513',modern:'#C96442',current:'#00C2CC',veil:'#B8962E'}[book.defaultTheme] || '#8B4513';
    const card = document.createElement('div');
    card.className = 'book-card';
    card.setAttribute('data-theme', book.defaultTheme);
    card.innerHTML = `
      <div class="book-card-spine" style="background:${spineColor}"></div>
      <div class="book-card-domain">${book.domain}</div>
      <div class="book-card-title">${book.title}</div>
      <div style="padding-left:4px;margin-bottom:10px;">
        <span class="theme-badge" style="background:${themeDot}22;color:${themeDot};border:0.5px solid ${themeDot}55;">
          <span class="theme-badge-dot" style="background:${themeDot}"></span>${themeLabel} Theme
        </span>
      </div>
      <div class="book-card-meta">
        <span>&#128214; ${chapterCount} chapters</span>
        <span>&#128196; ${pageCount} pages</span>
        ${noteCount>0?`<span>&#128211; ${noteCount} notes</span>`:''}
        <span>&#128197; ${book.date}</span>
      </div>
      <div class="book-card-open">Open book &#8594;</div>`;
    card.onclick = () => openBook(book.id);
    grid.appendChild(card);
  });
}

function openBook(bookId){
  currentBook = BOOKS.find(b=>b.id===bookId);
  currentBookId = bookId;
  allPages = [];
  currentBook.chapters.forEach(ch => ch.pages.forEach(pg => allPages.push({chapter:ch,page:pg})));
  currentPageIndex = getStorage('page_'+bookId)||0;
  if(currentPageIndex >= allPages.length) currentPageIndex = 0;
  currentTheme = getStorage('theme_'+bookId)||currentBook.defaultTheme;
  notes = getStorage('notes_'+bookId)||[];
  savedHighlights = getStorage('highlights_'+bookId)||{};
  document.getElementById('book-title-bar').textContent = currentBook.title;
  applyTheme(currentTheme);
  updateThemeBtn();
  showScreen('reader');
  switchTab('read');
  renderPage(null);
}

function goToLibrary(){
  setStorage('page_'+currentBookId, currentPageIndex);
  setStorage('theme_'+currentBookId, currentTheme);
  applyTheme(libTheme);
  showScreen('library');
  renderLibrary();
}

//  THEME
// ══════════════════════════════════════════════════════
const READER_THEMES = ['parchment','modern','current','veil'];
function toggleReaderTheme(){
  const available = READER_THEMES.filter(t => {
    if(t==='current') return currentBook.defaultTheme==='current';
    if(t==='veil') return currentBook.defaultTheme==='veil';
    if(t==='modern') return currentBook.defaultTheme!=='veil';
    return true;
  });
  const idx = available.indexOf(currentTheme);
  currentTheme = available[(idx+1)%available.length];
  applyTheme(currentTheme);
  updateThemeBtn();
  setStorage('theme_'+currentBookId, currentTheme);
}
function updateThemeBtn(){
  const labels={'parchment':'\uD83D\uDD6F Parchment','modern':'\u2736 Modern','current':'\u25C6 Current','veil':'\u2727 Veil'};
  document.getElementById('toggle-theme-btn').textContent=labels[currentTheme]||'\uD83D\uDD6F Parchment';
}
function applyTheme(t){
  const app=document.getElementById('app');
  app.classList.remove('parchment','modern','current','veil');
  app.classList.add(t);
}

//  SCREENS
// ══════════════════════════════════════════════════════
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
}

// ══════════════════════════════════════════════════════
//  READER
// ══════════════════════════════════════════════════════
function renderChapterNav(){
  const nav=document.getElementById('chapter-nav');nav.innerHTML='';
  currentBook.chapters.forEach(ch=>{
    const firstIdx=allPages.findIndex(p=>p.chapter.id===ch.id);
    const btn=document.createElement('button');btn.className='ch-btn';btn.textContent=ch.title;
    if(allPages[currentPageIndex]&&allPages[currentPageIndex].chapter.id===ch.id)btn.classList.add('active');
    btn.onclick=()=>goToPage(firstIdx);nav.appendChild(btn);
  });
}

function buildPageHTML(pd){
  const chN=notes.filter(n=>n.chapterId===pd.chapter.id).length;
  const nb=chN>0?`<button class="view-notes-inline-btn" onclick="switchTab('notes')">&#128211; ${chN} note${chN>1?'s':''}</button>`:'';
  return `<div class="chapter-label">${pd.chapter.label} \u2014 ${pd.chapter.title}</div><div class="page-heading">${pd.page.heading} ${nb}</div><div class="page-body">${pd.page.body}</div><div class="page-footer"><span>${pd.page.label}</span><span>Page ${currentPageIndex+1} of ${allPages.length}</span></div>`;
}

function renderPage(animate){
  const pd=allPages[currentPageIndex];
  const content=document.getElementById('page-content');
  function finishRender(){
    content.innerHTML=buildPageHTML(pd);
    restoreHighlights();renderChapterNav();
    document.getElementById('page-indicator').textContent=`${currentPageIndex+1} / ${allPages.length}`;
    document.getElementById('prev-btn').disabled=currentPageIndex===0;
    document.getElementById('next-btn').disabled=currentPageIndex===allPages.length-1;
    if(animate){
      content.classList.remove('enter-left','enter-right');
      void content.offsetWidth;
      content.classList.add(animate==='left'?'enter-left':'enter-right');
    }
  }
  if(animate){
    const exitClass=animate==='left'?'exit-left':'exit-right';
    content.classList.remove('exit-left','exit-right','enter-left','enter-right');
    void content.offsetWidth;
    content.classList.add(exitClass);
    content.addEventListener('animationend',()=>{content.classList.remove(exitClass);finishRender();},{once:true});
  } else { finishRender(); }
}

function flipPage(dir){const n=currentPageIndex+dir;if(n<0||n>=allPages.length)return;currentPageIndex=n;renderPage(dir>0?'left':'right');}
function goToPage(idx){const dir=idx>currentPageIndex?'left':'right';currentPageIndex=idx;renderPage(dir);}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(tab==='read'&&i===0)||(tab==='notes'&&i===1)));
  document.getElementById('page-view').classList.toggle('active',tab==='read');
  document.getElementById('notes-view').classList.toggle('active',tab==='notes');
  document.getElementById('floating-note-btn').style.display=tab==='read'?'flex':'none';
  if(tab==='notes')renderNotes();
}

// ══════════════════════════════════════════════════════
//  NOTES
// ══════════════════════════════════════════════════════
function renderNotes(){
  const c=document.getElementById('notes-content');
  if(notes.length===0){c.innerHTML='<div class="empty-notes">No notes yet. Add your first note while reading.</div>';return;}
  let html='';
  currentBook.chapters.forEach(ch=>{
    const chN=notes.filter(n=>n.chapterId===ch.id&&n.type!=='book');
    if(chN.length===0)return;
    html+=`<div class="notes-chapter-group"><div class="notes-chapter-title">${ch.title}</div>`;
    chN.forEach(n=>{html+=noteCard(n,notes.indexOf(n));});html+='</div>';
  });
  const bN=notes.filter(n=>n.type==='book');
  if(bN.length>0){html+=`<div class="notes-chapter-group"><div class="notes-chapter-title">Book Notes</div>`;bN.forEach(n=>{html+=noteCard(n,notes.indexOf(n));});html+='</div>';}
  c.innerHTML=html||'<div class="empty-notes">No notes yet.</div>';
}

function noteCard(n,idx){
  const lb=n.type.charAt(0).toUpperCase()+n.type.slice(1)+' Note';
  return `<div class="note-card"><button class="delete-note-btn" onclick="deleteNote(${idx})">&#10005;</button><span class="note-type-badge badge-${n.type}">${lb}</span><div class="note-text">${n.text}</div><div class="note-meta">${n.chapterTitle}${n.pageLabel?' \u00b7 '+n.pageLabel:''} \u00b7 ${n.date}</div></div>`;
}

function deleteNote(idx){
  notes.splice(idx,1);setStorage('notes_'+currentBookId,notes);renderNotes();renderPage(null);
}
function openNoteModal(){document.getElementById('note-modal').classList.add('open');document.getElementById('note-textarea').value='';selectNoteType('page',document.querySelectorAll('.note-type-btn')[0]);}
function closeNoteModal(){document.getElementById('note-modal').classList.remove('open');}
function selectNoteType(type,btn){
  currentNoteType=type;document.querySelectorAll('.note-type-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');
  const d={page:'Note about this specific page',chapter:"Note about this chapter's topic",book:'General note about the whole book'};
  document.getElementById('note-type-desc').textContent=d[type];
}
function saveNote(){
  const text=document.getElementById('note-textarea').value.trim();if(!text)return;
  const pd=allPages[currentPageIndex];
  notes.push({type:currentNoteType,text,chapterId:pd.chapter.id,chapterTitle:pd.chapter.title,pageLabel:currentNoteType==='page'?pd.page.label:null,date:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})});
  setStorage('notes_'+currentBookId,notes);closeNoteModal();renderPage(null);
}

// ══════════════════════════════════════════════════════
//  HIGHLIGHTS
// ══════════════════════════════════════════════════════
const hlT=document.getElementById('highlight-toolbar');
document.addEventListener('mouseup',e=>{
  if(hlT.contains(e.target))return;
  const sel=window.getSelection();
  if(sel&&sel.toString().trim().length>0&&document.getElementById('page-content').contains(sel.anchorNode)){
    pendingSelection=sel;const rect=sel.getRangeAt(0).getBoundingClientRect();
    hlT.style.top=(window.scrollY+rect.top-48)+'px';hlT.style.left=(rect.left+rect.width/2-90)+'px';hlT.classList.add('visible');
  }else if(!hlT.contains(e.target)){hlT.classList.remove('visible');pendingSelection=null;}
});

function applyHighlight(color){
  if(!pendingSelection||!pendingSelection.toString().trim())return;
  try{const r=pendingSelection.getRangeAt(0);const m=document.createElement('mark');m.className=`highlight-${color}`;m.dataset.hlColor=color;r.surroundContents(m);saveHighlightsFromDOM();}catch(e){}
  window.getSelection().removeAllRanges();hlT.classList.remove('visible');pendingSelection=null;
}
function clearHighlight(){
  if(!pendingSelection)return;
  const node=pendingSelection.anchorNode;const mark=node&&node.parentElement&&node.parentElement.tagName==='MARK'?node.parentElement:null;
  if(mark){const p=mark.parentNode;while(mark.firstChild)p.insertBefore(mark.firstChild,mark);p.removeChild(mark);saveHighlightsFromDOM();}
  hlT.classList.remove('visible');pendingSelection=null;
}
function saveHighlightsFromDOM(){
  const body=document.getElementById('page-content');if(!body)return;
  const marks=body.querySelectorAll('mark[data-hl-color]');
  savedHighlights['page_'+currentPageIndex]=Array.from(marks).map(m=>({color:m.dataset.hlColor,text:m.textContent}));
  setStorage('highlights_'+currentBookId,savedHighlights);
}
function restoreHighlights(){
  const hl=savedHighlights['page_'+currentPageIndex];if(!hl||hl.length===0)return;
  const body=document.getElementById('page-content');
  hl.forEach(h=>{
    const walker=document.createTreeWalker(body,NodeFilter.SHOW_TEXT);let node;
    while((node=walker.nextNode())){const idx=node.nodeValue.indexOf(h.text);if(idx>=0){try{const r=document.createRange();r.setStart(node,idx);r.setEnd(node,idx+h.text.length);const m=document.createElement('mark');m.className=`highlight-${h.color}`;m.dataset.hlColor=h.color;r.surroundContents(m);}catch(e){}break;}}
  });
}

// touch swipe
let tX=0,tY=0;
document.getElementById('page-spread').addEventListener('touchstart',e=>{tX=e.touches[0].clientX;tY=e.touches[0].clientY;},{passive:true});
document.getElementById('page-spread').addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tX,dy=e.changedTouches[0].clientY-tY;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40)flipPage(dx<0?1:-1);},{passive:true});

//  LIBRARY TABS
// ══════════════════════════════════════════════════════
let currentLibTab = 'books';
let currentBookNotesId = null;
let currentBookNotesFilter = 'book';

function libTab(tab, btn) {
  currentLibTab = tab;
  document.querySelectorAll('.lib-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.lib-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('lib-panel-' + tab).classList.add('active');
  if (tab === 'notes') renderAllNotesList();
}

// ══════════════════════════════════════════════════════
//  ALL NOTES LIST (library level)
// ══════════════════════════════════════════════════════
function renderAllNotesList() {
  const container = document.getElementById('all-notes-list');
  let html = '';
  let anyNotes = false;

  BOOKS.forEach(book => {
    const bookNotes = getStorage('notes_' + book.id) || [];
    if (bookNotes.length === 0) return;
    anyNotes = true;

    const counts = {
      book: bookNotes.filter(n => n.type === 'book').length,
      chapter: bookNotes.filter(n => n.type === 'chapter').length,
      page: bookNotes.filter(n => n.type === 'page').length,
    };
    const spineColor = book.defaultTheme === 'current' ? 'var(--flow-accent)'
      : book.defaultTheme === 'modern' ? 'var(--mod-accent)'
      : book.defaultTheme === 'veil' ? 'var(--veil-accent)' : 'var(--parch-accent)';
    const parts = [];
    if (counts.book) parts.push(`&#128218; ${counts.book} book note${counts.book !== 1 ? 's' : ''}`);
    if (counts.chapter) parts.push(`&#128196; ${counts.chapter} chapter note${counts.chapter !== 1 ? 's' : ''}`);
    if (counts.page) parts.push(`&#128393; ${counts.page} page note${counts.page !== 1 ? 's' : ''}`);

    html += `<div class="book-notes-row" onclick="openBookNotesDetail('${book.id}')">
      <div class="bnr-spine" style="background:${spineColor}"></div>
      <div class="bnr-body">
        <div class="bnr-domain">${book.domain}</div>
        <div class="bnr-title">${book.title}</div>
        <div class="bnr-counts">${parts.map(p => `<span>${p}</span>`).join('')}</div>
        <div class="bnr-open">View notes &#8594;</div>
      </div>
    </div>`;
  });

  if (!anyNotes) {
    html = '<div class="all-notes-empty">No notes yet.<br>Open a book and start annotating.</div>';
  }
  container.innerHTML = html;
}

// ══════════════════════════════════════════════════════
//  BOOK NOTES DETAIL SCREEN
// ══════════════════════════════════════════════════════
function openBookNotesDetail(bookId) {
  currentBookNotesId = bookId;
  currentBookNotesFilter = 'book';
  const book = BOOKS.find(b => b.id === bookId);
  document.getElementById('book-notes-title-bar').textContent = book ? book.title : '';
  // reset toggle buttons
  document.querySelectorAll('.bntog').forEach((b, i) => b.classList.toggle('active', i === 0));
  applyTheme(book ? book.defaultTheme : libTheme);
  showScreen('book-notes');
  renderBookNotesDetail();
}

function goToAllNotes() {
  applyTheme(libTheme);
  showScreen('library');
  // make sure All Notes tab is active
  document.querySelectorAll('.lib-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.lib-tab')[1].classList.add('active');
  document.querySelectorAll('.lib-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('lib-panel-notes').classList.add('active');
  renderAllNotesList();
}

function bookNotesToggle(type, btn) {
  currentBookNotesFilter = type;
  document.querySelectorAll('.bntog').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderBookNotesDetail();
}

function renderBookNotesDetail() {
  const container = document.getElementById('book-notes-detail-content');
  const book = BOOKS.find(b => b.id === currentBookNotesId);
  if (!book) return;
  const bookNotes = (getStorage('notes_' + currentBookNotesId) || []).filter(n => n.type === currentBookNotesFilter);

  if (bookNotes.length === 0) {
    container.innerHTML = `<div class="all-notes-empty">No ${currentBookNotesFilter} notes for this book yet.<br>Open the book to add some.</div>`;
    return;
  }

  // build allPages for this book to resolve page targets
  const bookAllPages = [];
  book.chapters.forEach(ch => ch.pages.forEach(pg => bookAllPages.push({ chapter: ch, page: pg })));

  let html = '';
  if (currentBookNotesFilter === 'book') {
    html += noteDetailGroup('Book Notes', bookNotes, bookAllPages, book, 0);
  } else if (currentBookNotesFilter === 'chapter') {
    book.chapters.forEach(ch => {
      const chNotes = bookNotes.filter(n => n.chapterId === ch.id);
      if (chNotes.length === 0) return;
      const firstIdx = bookAllPages.findIndex(p => p.chapter.id === ch.id);
      html += noteDetailGroup(ch.title, chNotes, bookAllPages, book, firstIdx);
    });
  } else {
    // page notes — group by chapter for readability
    book.chapters.forEach(ch => {
      const chNotes = bookNotes.filter(n => n.chapterId === ch.id);
      if (chNotes.length === 0) return;
      html += `<div class="notes-chapter-group"><div class="notes-chapter-title">${ch.title}</div>`;
      chNotes.forEach(n => {
        const pageIdx = bookAllPages.findIndex(p => p.page.label === n.pageLabel && p.chapter.id === n.chapterId);
        const targetIdx = pageIdx >= 0 ? pageIdx : bookAllPages.findIndex(p => p.chapter.id === n.chapterId);
        html += detailNoteCard(n, book.id, targetIdx);
      });
      html += '</div>';
    });
  }

  container.innerHTML = html || `<div class="all-notes-empty">No ${currentBookNotesFilter} notes yet.</div>`;
}

function noteDetailGroup(title, notes, bookAllPages, book, defaultTargetIdx) {
  let html = `<div class="notes-chapter-group"><div class="notes-chapter-title">${title}</div>`;
  notes.forEach(n => {
    let targetIdx = defaultTargetIdx;
    if (n.type === 'chapter' && n.chapterId) {
      const fi = bookAllPages.findIndex(p => p.chapter.id === n.chapterId);
      if (fi >= 0) targetIdx = fi;
    }
    html += detailNoteCard(n, book.id, targetIdx);
  });
  html += '</div>';
  return html;
}

function detailNoteCard(n, bookId, targetPageIdx) {
  const lb = n.type.charAt(0).toUpperCase() + n.type.slice(1) + ' Note';
  const loc = n.chapterTitle + (n.pageLabel ? ' · ' + n.pageLabel : '');
  return `<div class="note-card">
    <span class="note-type-badge badge-${n.type}">${lb}</span>
    <div class="note-text">${n.text}</div>
    <div class="note-card-footer">
      <div class="note-meta">${loc} · ${n.date}</div>
      <button class="open-in-book-btn" onclick="openBookAtPage('${bookId}', ${targetPageIdx})">Open in Book →</button>
    </div>
  </div>`;
}

function openBookAtPage(bookId, pageIdx) {
  openBook(bookId);
  // after openBook sets up state, jump to the right page
  currentPageIndex = Math.min(pageIdx, allPages.length - 1);
  renderPage(null);
  renderChapterNav();
}

applyTheme('parchment');
renderLibrary();
</script>
